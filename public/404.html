<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    var base = '/sistema-seguimiento-tutorial';
    var path = l.pathname.replace(base, '') || '/';
    var search = l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '';
    var hash = l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '';
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base + '/?p=' + encodeURIComponent(path) + search + hash);
  </script>
</head>
<body></body>
</html>
