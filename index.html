    <script>
      // Restore path redirected via 404.html
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (!p) return;
        params.delete('p');
        var q = params.get('q'); params.delete('q');
        var h = params.get('h'); params.delete('h');
        var url = '/sistema-seguimiento-tutorial' + p
          + (q ? '?' + decodeURIComponent(q) : '')
          + (params.toString() ? (q ? '&' : '?') + params.toString() : '')
          + (h ? '#' + decodeURIComponent(h) : '');
        window.history.replaceState(null, null, url);
      })();
    </script>

    <div id="root"></div>
